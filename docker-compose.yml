# Docker Compose для локальной разработки
# Продакшен развёртывание — см. docs/deployment.md

version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: crm_db
      POSTGRES_USER: crm_user
      POSTGRES_PASSWORD: crm_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://crm_user:crm_password@db:5432/crm_db
      SECRET_KEY: dev-secret-key-change-in-production
    volumes:
      - ./uploads:/app/uploads
    ports:
      - "8090:8090"
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
