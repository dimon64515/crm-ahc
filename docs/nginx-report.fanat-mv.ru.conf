server {
    server_name report.fanat-mv.ru;

    # Frontend (React build)
    location / {
        root /home/dimon64515/projects/crm/frontend/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Never cache index.html so updates are always fresh
    location = /index.html {
        root /home/dimon64515/projects/crm/frontend/dist;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # Backend API
    location /api/ {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        client_max_body_size 50M;
    }

    # Uploaded files
    location /uploads/ {
        alias /home/dimon64515/projects/crm/uploads/;
        expires 7d;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/report.fanat-mv.ru/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/report.fanat-mv.ru/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = report.fanat-mv.ru) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name report.fanat-mv.ru;
    return 404; # managed by Certbot


}